name: MindBridge CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. LINT
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install flake8
      - run: flake8 functions/ --max-line-length=120 --exclude=migrations,venv,__pycache__

  # ─────────────────────────────────────────────────────────────
  # 2. TEST
  # ─────────────────────────────────────────────────────────────
  test:
    name: Tests (Neon PostgreSQL)
    runs-on: ubuntu-latest
    needs: lint

    env:
      SECRET_KEY:             ${{ secrets.SECRET_KEY }}
      DEBUG:                  'True'
      DB_NAME:                ${{ secrets.DB_NAME }}
      DB_USER:                ${{ secrets.DB_USER }}
      DB_PASSWORD:            ${{ secrets.DB_PASSWORD }}
      DB_HOST:                ${{ secrets.DB_HOST }}
      DB_PORT:                '5432'
      ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
      ENABLE_FACE_SCAN:       'false'
      ENABLE_RAG:             'false'
      DJANGO_SETTINGS_MODULE: config.settings

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        working-directory: functions
        run: pip install -r requirements.txt
      - name: Run migrations
        working-directory: functions
        run: python manage.py migrate
      - name: Run tests
        working-directory: functions
        run: python manage.py test --verbosity=2

  # ─────────────────────────────────────────────────────────────
  # 3. TRIGGER RENDER AUTO-DEPLOY (main only)
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy Backend (mindbridge-api)
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}" \
            -H "Content-Type: application/json" \
            | echo "Backend deploy triggered"

      - name: Deploy Frontend (mindbridge-frontend)
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}" \
            -H "Content-Type: application/json" \
            | echo "Frontend deploy triggered"

  # ─────────────────────────────────────────────────────────────
  # 4. SECURITY AUDIT
  # ─────────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install safety bandit
      - run: safety check -r functions/requirements.txt || true
      - run: bandit -r functions/ -x functions/migrations --severity-level medium || true
