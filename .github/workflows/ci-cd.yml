name: MindBridge CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. LINT
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install flake8
      - run: flake8 functions/ --max-line-length=120 --exclude=migrations,venv,__pycache__

  # ─────────────────────────────────────────────────────────────
  # 2. TEST BACKEND
  # ─────────────────────────────────────────────────────────────
  test:
    name: Tests (Neon PostgreSQL)
    runs-on: ubuntu-latest
    needs: lint

    env:
      SECRET_KEY:             ${{ secrets.SECRET_KEY }}
      DEBUG:                  'True'
      DB_NAME:                ${{ secrets.DB_NAME }}
      DB_USER:                ${{ secrets.DB_USER }}
      DB_PASSWORD:            ${{ secrets.DB_PASSWORD }}
      DB_HOST:                ${{ secrets.DB_HOST }}
      DB_PORT:                '5432'
      ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
      ENABLE_FACE_SCAN:       'false'
      ENABLE_RAG:             'false'
      DJANGO_SETTINGS_MODULE: config.settings

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        working-directory: functions
        run: pip install -r requirements.txt
      - name: Check DB secrets
        run: |
          if [ -z "$DB_NAME" ]; then echo "ERROR: DB_NAME is empty"; exit 1; fi
          if [ -z "$DB_USER" ]; then echo "ERROR: DB_USER is empty"; exit 1; fi
          if [ -z "$DB_HOST" ]; then echo "ERROR: DB_HOST is empty"; exit 1; fi
          if [ -z "$DB_PASSWORD" ]; then echo "ERROR: DB_PASSWORD is empty"; exit 1; fi
          echo "All DB secrets confirmed"
      - name: Run migrations
        working-directory: functions
        run: python manage.py migrate
      - name: Run tests
        working-directory: functions
        run: python manage.py test --verbosity=2

  # ─────────────────────────────────────────────────────────────
  # 3. BUILD FRONTEND (verify it compiles)
  # ─────────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend (React)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json
      - name: Install & build
        working-directory: frontend
        env:
          CI: false
          REACT_APP_API_URL: https://mindbridge-api.onrender.com
        run: |
          npm install
          npm run build
      - name: Confirm build output
        run: ls frontend/build/

  # ─────────────────────────────────────────────────────────────
  # NOTE: Deployment is handled automatically by Render
  # Render watches this GitHub repo and deploys on every push to main
  # Backend:  https://mindbridge-api.onrender.com
  # Frontend: https://mindbridge-frontend.onrender.com
  # ─────────────────────────────────────────────────────────────

  # ─────────────────────────────────────────────────────────────
  # 4. SECURITY AUDIT
  # ─────────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install safety bandit
      - run: safety check -r functions/requirements.txt || true
      - run: bandit -r functions/ -x functions/migrations --severity-level medium || true
