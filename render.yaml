# Render Blueprint — deploys both Django API and React frontend
# docs: https://render.com/docs/blueprint-spec

services:
  # ── Django Backend ──────────────────────────────────────────
  - type: web
    name: mindbridge-api
    runtime: python
    rootDir: functions
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    healthCheckPath: /api/v1/modules/
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: 'False'
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: '5432'
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: 'mindbridge-api.onrender.com,mindbridge-noel.web.app'
      - key: CORS_ALLOWED_ORIGINS
        value: 'https://mindbridge-noel.web.app,https://mindbridge-api.onrender.com'
      - key: ENABLE_FACE_SCAN
        value: 'true'
      - key: ENABLE_RAG
        value: 'true'

  # ── React Frontend ──────────────────────────────────────────
  - type: web
    name: mindbridge-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_API_URL
        value: 'https://mindbridge-api.onrender.com'
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
